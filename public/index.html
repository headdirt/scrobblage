<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Generate a collage of your top albums from Last.fm">
    <meta name="theme-color" content="#1a1a1a">
    <meta property="og:title" content="scrobblage">
    <meta property="og:description" content="Generate a collage of your top albums from Last.fm">
    <meta property="og:type" content="website">
    <title>scrobblage</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1><img src="/favicon.svg" alt="" width="32" height="32" style="vertical-align: middle; margin-right: 0.3em;">scrobblage</h1>
                <p class="subtitle">Generate a collage of your top albums from Last.fm</p>
            </div>
            <a href="https://github.com/headdirt/scrobblage" class="github-link" title="View on GitHub"><svg width="24" height="24" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg></a>
        </div>

        <form id="collage-form" autocomplete="off">
            <div class="form-row">
                <label for="lastfm-profile">Last.fm Profile</label>
                <input type="text" id="lastfm-profile" name="lastfm-profile" required placeholder="profile name" autocomplete="off" data-1p-ignore data-lpignore="true" data-bwignore data-form-type="other">
            </div>
            <div class="form-group">
                <div class="form-row">
                    <label for="period">Time Period</label>
                    <select id="period" name="period">
                        <option value="7day">Last 7 Days</option>
                        <option value="1month">Last Month</option>
                        <option value="3month">Last 3 Months</option>
                        <option value="6month">Last 6 Months</option>
                        <option value="12month">Last 12 Months</option>
                        <option value="overall">Overall</option>
                    </select>
                </div>
                <div class="form-row">
                    <label for="size">Grid Size</label>
                    <select id="size" name="size">
                        <option value="3">3x3</option>
                        <option value="4">4x4</option>
                        <option value="5" selected>5x5</option>
                        <option value="7">7x7</option>
                        <option value="10">10x10</option>
                    </select>
                </div>
            </div>
            <details class="options-section">
                <summary>Options</summary>
                <div class="options-grid">
                    <label class="checkbox-label">
                        <input type="checkbox" id="hide-captions"> Hide captions
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="show-playcount"> Show play counts
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="skip-nocover"> Skip albums without covers
                    </label>
                </div>
            </details>
            <button type="submit" id="submit-btn">Generate Collage</button>
        </form>

        <div id="loading" style="display:none;">
            <div class="spinner"></div>
            <span id="loading-text">Generating collage...</span>
        </div>

        <div id="error" style="display:none;"></div>

        <div id="result" style="display:none;">
            <canvas id="collage-canvas" style="display:none;"></canvas>
            <img id="collage-img">
            <div class="result-actions">
                <a id="download-link" class="download-btn">Download Image</a>
                <button id="copy-btn" class="download-btn" type="button">Copy to Clipboard</button>
            </div>
        </div>
    </div>

    <script>
        const TILE_SIZE = 300;
        const form = document.getElementById("collage-form");
        const canvas = document.getElementById("collage-canvas");
        const ctx = canvas.getContext("2d");
        const collageImg = document.getElementById("collage-img");
        const loading = document.getElementById("loading");
        const result = document.getElementById("result");
        const error = document.getElementById("error");
        const downloadLink = document.getElementById("download-link");
        const submitBtn = document.getElementById("submit-btn");
        const loadingText = document.getElementById("loading-text");
        const copyBtn = document.getElementById("copy-btn");
        const periodSelect = document.getElementById("period");
        const sizeSelect = document.getElementById("size");
        const ALLOWED_PERIODS = new Set(Array.from(periodSelect.options, (o) => o.value));
        const ALLOWED_SIZES = new Set(Array.from(sizeSelect.options, (o) => o.value));

        function loadImage(url, retries = 2) {
            return new Promise((resolve) => {
                if (!url) { resolve(null); return; }
                const img = new Image();
                img.crossOrigin = "anonymous";
                img.onload = () => resolve(img);
                img.onerror = () => {
                    if (retries > 0) {
                        setTimeout(() => loadImage(url, retries - 1).then(resolve), 500);
                    } else {
                        resolve(null);
                    }
                };
                img.src = url;
            });
        }

        function canvasToBlob(type = "image/png", quality) {
            return new Promise((resolve, reject) =>
                canvas.toBlob((b) => b ? resolve(b) : reject(new Error("Failed to render image.")), type, quality)
            );
        }

        function drawText(x, y, text) {
            ctx.strokeText(text, x, y);
            ctx.fillText(text, x, y);
        }

        async function generate(user, period, dim, opts) {
            const slots = dim * dim;
            const params = new URLSearchParams({ user, period, size: String(dim) });
            if (opts.skipNocover) params.set("nocover", "true");
            loadingText.textContent = "Fetching album data...";
            const resp = await fetch(`/api/collage-data?${params}`);
            const data = await resp.json().catch(() => null);
            if (!resp.ok) {
                throw new Error(data?.message || `Last.fm request failed (${resp.status})`);
            }

            const albums = data?.albums || [];
            if (albums.length === 0) throw new Error("No albums found for this user and time period.");

            let loaded = 0;
            loadingText.textContent = `Loading images (0/${albums.length})...`;
            const images = await Promise.all(albums.map((a) =>
                loadImage(a.image_url).then(img => {
                    loadingText.textContent = `Loading images (${++loaded}/${albums.length})...`;
                    return img;
                })
            ));

            canvas.width = dim * TILE_SIZE;
            canvas.height = dim * TILE_SIZE;
            ctx.fillStyle = "#1e1e1e";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = "bold 14px -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif";
            ctx.lineWidth = 3;
            ctx.lineJoin = "round";
            ctx.strokeStyle = "black";
            ctx.fillStyle = "white";

            for (let i = 0; i < slots && i < albums.length; i++) {
                const row = Math.floor(i / dim);
                const col = i % dim;
                const x = col * TILE_SIZE;
                const y = row * TILE_SIZE;

                if (images[i]) ctx.drawImage(images[i], x, y, TILE_SIZE, TILE_SIZE);

                let textY = y + 16;
                if (!opts.hideCaptions) {
                    drawText(x + 5, textY, albums[i].artist); textY += 16;
                    drawText(x + 5, textY, albums[i].album); textY += 16;
                }
                if (opts.showPlaycount) drawText(x + 5, textY, `${albums[i].playcount} plays`);
            }
        }

        function getFormState() {
            return {
                user: document.getElementById("lastfm-profile").value.trim(),
                period: document.getElementById("period").value,
                size: document.getElementById("size").value,
                hideCaptions: document.getElementById("hide-captions").checked,
                showPlaycount: document.getElementById("show-playcount").checked,
                skipNocover: document.getElementById("skip-nocover").checked,
            };
        }

        function updateURL(state) {
            const params = new URLSearchParams({ user: state.user });
            if (state.period !== "7day") params.set("period", state.period);
            if (state.size !== "5") params.set("size", state.size);
            if (state.hideCaptions) params.set("captions", "false");
            if (state.showPlaycount) params.set("playcount", "true");
            if (state.skipNocover) params.set("nocover", "true");
            history.replaceState(null, "", "?" + params.toString());
        }

        function loadFromURL() {
            const params = new URLSearchParams(location.search);
            if (params.has("user")) document.getElementById("lastfm-profile").value = params.get("user");
            const period = params.get("period");
            if (ALLOWED_PERIODS.has(period)) periodSelect.value = period;
            const size = params.get("size");
            if (ALLOWED_SIZES.has(size)) sizeSelect.value = size;
            if (params.get("captions") === "false") document.getElementById("hide-captions").checked = true;
            if (params.get("playcount") === "true") document.getElementById("show-playcount").checked = true;
            if (params.get("nocover") === "true") document.getElementById("skip-nocover").checked = true;
            if (params.has("auto")) submitForm();
        }

        function canCopyImage() {
            return window.isSecureContext && navigator.clipboard?.write && window.ClipboardItem;
        }

        let isGenerating = false;
        async function submitForm() {
            if (isGenerating) return;
            const state = getFormState();
            if (!state.user) return;
            isGenerating = true;

            const dim = parseInt(state.size);

            loading.style.display = "flex";
            result.style.display = "none";
            error.style.display = "none";
            submitBtn.disabled = true;

            try {
                await generate(state.user, state.period, dim, state);
                updateURL(state);
                const baseName = `${state.user}_${state.period}_${dim}x${dim}`;
                const blob = await canvasToBlob("image/jpeg", 0.92);
                if (downloadLink.href.startsWith("blob:")) URL.revokeObjectURL(downloadLink.href);
                const url = URL.createObjectURL(blob);
                collageImg.src = url;
                downloadLink.href = url;
                downloadLink.download = `${baseName}.jpg`;
                result.style.display = "flex";
            } catch (err) {
                error.textContent = err.message || "Failed to generate collage.";
                error.style.display = "block";
            } finally {
                loading.style.display = "none";
                submitBtn.disabled = false;
                isGenerating = false;
            }
        }

        form.addEventListener("submit", (e) => { e.preventDefault(); submitForm(); });

        copyBtn.addEventListener("click", async () => {
            const label = copyBtn.textContent;
            copyBtn.disabled = true;
            try {
                await navigator.clipboard.write([new ClipboardItem({ "image/png": canvasToBlob() })]);
                copyBtn.textContent = "Copied!";
            } catch {
                copyBtn.textContent = "Copy failed";
            } finally {
                setTimeout(() => { copyBtn.textContent = label; copyBtn.disabled = false; }, 2000);
            }
        });

        loadFromURL();
        if (!canCopyImage()) {
            copyBtn.disabled = true;
            copyBtn.title = "Image clipboard copy is not available in this browser or context.";
        }
    </script>
</body>
</html>
